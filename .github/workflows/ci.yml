name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build

  graphql-server:
    name: Build GraphQL Server
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: cd graphql-server && npm ci && npm run build

  indexer:
    name: Build Indexer
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: cd indexer && npm ci && npm run build

  db-lint:
    name: Validate SQL Schema
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: lumina_test
          POSTGRES_USER: lumina
          POSTGRES_PASSWORD: lumina_test
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4
      - name: Apply schema
        run: psql postgresql://lumina:lumina_test@localhost:5432/lumina_test -f db/schema.sql
