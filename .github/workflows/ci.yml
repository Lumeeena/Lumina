name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run build
      - run: npm test

  graphql-server:
    name: Build GraphQL Server
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: graphql-server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm run build

  indexer:
    name: Build Indexer
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: indexer
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm run build
      - run: npm test

  contracts:
    name: Build Contracts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - run: cd contracts && cargo build --target wasm32-unknown-unknown --release
      - run: cd contracts && cargo test

  db-lint:
    name: Validate SQL Schema
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: lumina_test
          POSTGRES_USER: lumina
          POSTGRES_PASSWORD: lumina_test
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4
      - run: psql postgresql://lumina:lumina_test@localhost:5432/lumina_test -f db/schema.sql
