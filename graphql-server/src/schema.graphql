"""
Lumina GraphQL Schema — Stellar Network Event Index
"""

type Query {
  """Fetch recent transactions, newest first."""
  transactions(limit: Int = 20, cursor: String): TransactionPage!

  """Get a single transaction by hash."""
  transaction(hash: String!): Transaction

  """Fetch an account by Stellar address."""
  account(address: String!): Account

  """
  Fetch operations, optionally filtered by account address and type.
  """
  operations(
    account: String
    type: OperationType
    limit: Int = 20
    cursor: String
  ): OperationPage!

  """
  Fetch Soroban contract events by contract ID.
  Requires Soroban RPC indexing to be enabled.
  """
  events(
    contractId: String!
    topic: String
    limit: Int = 20
    cursor: String
  ): ContractEventPage!

  """Get a specific ledger by sequence number."""
  ledger(sequence: Int!): Ledger

  """Get the latest ledger."""
  latestLedger: Ledger
}

type Subscription {
  """Subscribe to new transactions as they are confirmed."""
  newTransaction: Transaction!

  """Subscribe to new operations for a specific account."""
  accountActivity(address: String!): Operation!
}

# ─── Pagination ──────────────────────────────────────────────────────────────

type PageInfo {
  hasNextPage: Boolean!
  cursor: String
}

type TransactionPage {
  items: [Transaction!]!
  pageInfo: PageInfo!
}

type OperationPage {
  items: [Operation!]!
  pageInfo: PageInfo!
}

type ContractEventPage {
  items: [ContractEvent!]!
  pageInfo: PageInfo!
}

# ─── Core Types ───────────────────────────────────────────────────────────────

type Ledger {
  sequence: Int!
  closedAt: String!
  transactionCount: Int!
  operationCount: Int!
  baseFee: Int!
  baseReserve: Int!
}

type Transaction {
  hash: String!
  ledger: Int!
  ledgerData: Ledger
  createdAt: String!
  sourceAccount: String!
  account: Account
  feeCharged: String!
  operationCount: Int!
  successful: Boolean!
  memoType: String
  memo: String
  operations: [Operation!]!
}

type Account {
  address: String!
  sequence: String!
  subentryCount: Int!
  lastModifiedLedger: Int!
  numSponsored: Int!
  numSponsoring: Int!
  balances: [Balance!]!
  flags: AccountFlags!
  thresholds: Thresholds!
  transactions(limit: Int = 10): [Transaction!]!
  operations(limit: Int = 10): [Operation!]!
}

type Balance {
  assetType: String!
  assetCode: String
  assetIssuer: String
  balance: String!
  limit: String
  buyingLiabilities: String
  sellingLiabilities: String
}

type AccountFlags {
  authRequired: Boolean!
  authRevocable: Boolean!
  authImmutable: Boolean!
  authClawbackEnabled: Boolean!
}

type Thresholds {
  lowThreshold: Int!
  medThreshold: Int!
  highThreshold: Int!
}

type Operation {
  id: String!
  type: OperationType!
  createdAt: String!
  transactionHash: String!
  transaction: Transaction
  sourceAccount: String!
  account: Account

  # Payment fields
  from: String
  to: String
  amount: String
  asset: String

  # Create account fields
  startingBalance: String
  funder: String

  # Manage offer fields
  offerId: String
  price: String
  selling: String
  buying: String
}

type ContractEvent {
  id: String!
  type: String!
  contractId: String!
  ledger: Int!
  createdAt: String!
  pagingToken: String!
  topics: [String!]!
  value: String  # JSON-encoded value
}

# ─── Enums ───────────────────────────────────────────────────────────────────

enum OperationType {
  PAYMENT
  CREATE_ACCOUNT
  PATH_PAYMENT_STRICT_SEND
  PATH_PAYMENT_STRICT_RECEIVE
  MANAGE_SELL_OFFER
  MANAGE_BUY_OFFER
  CREATE_PASSIVE_SELL_OFFER
  SET_OPTIONS
  CHANGE_TRUST
  ALLOW_TRUST
  ACCOUNT_MERGE
  MANAGE_DATA
  BUMP_SEQUENCE
  INVOKE_HOST_FUNCTION
  EXTEND_FOOTPRINT_TTL
  RESTORE_FOOTPRINT
}
